<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ระบบแสดงกระทู้ถามในที่ประชุมสภา (Fixed Version)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Noto+Serif+Thai:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#f0ede8;color:#111;min-height:100vh}
.hdr{background:#1a3a5c;color:#fff;padding:13px 24px;display:flex;align-items:center;gap:12px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr h1{font-family:'Noto Serif Thai',serif;font-size:18px;font-weight:700}
.topbar{background:#fff;border-bottom:3px solid #c9a227;padding:10px 24px;display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:10px;font-weight:700;color:#1a3a5c}
.fg input,.fg select{font-family:'Sarabun',sans-serif;font-size:14px;padding:7px 10px;border:1.5px solid #d4cfc7;border-radius:6px;outline:none}
.btn{font-family:'Sarabun',sans-serif;font-size:13px;font-weight:700;padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#1a3a5c;color:#fff}
.main{padding:18px 24px 48px}
.doc{background:#fff;border:1px solid #ccc;border-radius:4px;box-shadow:0 4px 20px rgba(0,0,0,.1);max-width:960px;margin:0 auto 28px}
.doc-head{text-align:center;padding:25px 36px 15px;border-bottom:2px solid #222}
.doc-head h2{font-family:'Noto Serif Thai',serif;font-size:22px;font-weight:700}
.doc-date{display:inline-block;background:#FFD700;padding:2px 14px;border-radius:3px;font-size:20px;font-weight:700;margin-top:8px}
.doc-body{padding:25px 40px 30px}
.sec-label{font-size:17px;font-weight:600;font-style:italic;text-decoration:underline;margin:25px 0 15px;color:#1a3a5c}
.item{margin-bottom:22px;padding-bottom:18px;border-bottom:1px dashed #bbb}
.line{font-size:16.5px;line-height:1.8;margin-bottom:6px;word-break:break-all;overflow-wrap:break-word} /* แก้ไขให้รองรับข้อความยาวมาก */
.num{font-weight:700}
.badge{display:inline-block;padding:2px 12px;border-radius:4px;font-weight:700;font-size:15px}
.hl-y{background:#FFD700;color:#000}.hl-g{background:#22CC55;color:#fff}.hl-r{background:#EE3333;color:#fff}
@media print{.hdr,.topbar,.btn{display:none!important}}
</style>
</head>
<body>

<div class="hdr">
  <div style="font-size:28px">⚖️</div>
  <div><h1>ระบบแสดงกระทู้ถามในที่ประชุมสภา</h1></div>
</div>

<div class="topbar">
  <div class="fg"><label>📅 เลือกวันที่</label><select id="dateSel" style="min-width:180px"></select></div>
  <div class="fg"><label>🏛️ ประเภทสภา</label><select id="typeSel"><option value="">ทั้งหมด</option><option value="สส.">สส.</option><option value="สว.">สว.</option></select></div>
  <div class="fg"><label>🔎 ค้นหา</label><input id="search" type="text" placeholder="ชื่อเรื่อง/ผู้ถาม..." style="min-width:220px"></div>
  <button class="btn" id="btnLoad">🔄 โหลดข้อมูลใหม่</button>
</div>

<div class="main" id="mainEl">
  <div style="text-align:center;padding:50px;color:#888">กรุณากดปุ่มโหลดข้อมูล</div>
</div>

<script>
(function(){
'use strict';
var allRows = [];
var TD = '๐๑๒๓๔๕๖๗๘๙';
function toThai(str) { return String(str).replace(/\d/g, d => TD[d]); }

function render() {
  var dSel = document.getElementById('dateSel').value;
  var tSel = document.getElementById('typeSel').value;
  var q = document.getElementById('search').value.toLowerCase();
  
  var rows = allRows.filter(r => {
    var d = (r[1] || '').trim(); // Col 2
    var t = (r[4] || '').trim(); // Col 5
    var topic = (r[3] || '').toLowerCase(); // Col 4
    var asker = (r[2] || '').toLowerCase(); // Col 3
    if(dSel && d !== dSel) return false;
    if(tSel && t.indexOf(tSel) < 0) return false;
    if(q && topic.indexOf(q) < 0 && asker.indexOf(q) < 0) return false;
    return true;
  });

  var groupedByDate = {};
  rows.forEach(r => {
    var d = (r[1] || '').trim();
    if(!groupedByDate[d]) groupedByDate[d] = [];
    groupedByDate[d].push(r);
  });

  var html = Object.keys(groupedByDate).map(dateStr => {
    var items = groupedByDate[dateStr];
    var catGroups = {};
    items.forEach(r => {
      // ดึง Col 11 (Index 10) มาเป็นประเภทกระทู้ตรงๆ
      var c = (r[10] || 'กระทู้ถามทั่วไป').trim(); 
      if(!catGroups[c]) catGroups[c] = [];
      catGroups[c].push(r);
    });

    var body = Object.keys(catGroups).map(catName => {
      var header = '<div class="sec-label">' + catName + '</div>';
      var list = catGroups[catName].map((r, i) => {
        var topic = r[3] || ''; // Col 4
        var asker = r[2] || ''; // Col 3
        var pos = r[4] || '';   // Col 5
        var ask = r[5] || '';   // Col 6
        var del = r[6] || '';   // Col 7
        var res = r[7] || '';   // Col 8
        var ans = r[8] || '';   // Col 9

        var askLine = ask + (del ? ' / มอบ ' + del : '');
        var cls = '';
        if(ans.includes('ชี้แจง')) cls = 'hl-g';
        else if(ans.includes('เลื่อน')) cls = 'hl-y';
        else if(ans.includes('ค้าง')) cls = 'hl-r';

        return '<div class="item">' +
          '<div class="line"><span class="num">'+toThai(i+1)+'. กระทู้ถาม เรื่อง</span> '+topic+'</div>' +
          '<div class="line">ผู้ถาม '+asker+' '+pos+'</div>' +
          (askLine ? '<div class="line">ถาม '+askLine+'</div>' : '') +
          '<div class="line">ผู้ตอบ '+(ans ? '<span class="badge '+cls+'">'+(res ? res+' ' : '')+ans+'</span>' : '—')+'</div>' +
          '</div>';
      }).join('');
      return header + list;
    }).join('');

    return '<div class="doc"><div class="doc-head"><h2>กระทู้ถามในที่ประชุมสภา</h2><br><span class="doc-date">'+toThai(dateStr)+'</span></div>' +
           '<div class="doc-body">'+body+'</div></div>';
  }).join('');

  document.getElementById('mainEl').innerHTML = html || '<div style="text-align:center;padding:50px">ไม่พบข้อมูล</div>';
}

document.getElementById('btnLoad').onclick = function() {
  var urlSS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrK9xfTfi4qr_wPH-_8NSs4FQApmOVEs8g6QS-2U5OVKfPPh0k7swNCZ0dn8HMy8Aj5P92vGrtVa4m/pub?output=csv";
  var urlSV = urlSS + "&gid=272426708";
  
  Promise.all([
    fetch(urlSS).then(res => res.text()),
    fetch(urlSV).then(res => res.text())
  ]).then(texts => {
    // การ Parse แบบ CSV ที่ถูกต้องเพื่อไม่ให้ลำดับคอลัมน์เคลื่อน
    var parse = t => {
        var lines = t.split('\n');
        return lines.map(line => {
            // ใช้ Regex เพื่อจัดการเครื่องหมายอัญประกาศใน CSV ป้องกันคอลัมน์สลับ
            var cols = line.match(/(".*?"|[^",\s]+)(?=\s*,|\s*$)/g) || [];
            return cols.map(c => c.replace(/^"|"$/g, '').trim());
        }).filter(r => r.length > 5);
    };
    
    allRows = parse(texts[0]).concat(parse(texts[1]));
    
    var dates = [...new Set(allRows.map(r => r[1]).filter(d => d && d !== 'วันที่'))];
    document.getElementById('dateSel').innerHTML = dates.map(d => '<option value="'+d+'">'+toThai(d)+'</option>').join('');
    render();
  });
};

document.getElementById('search').oninput = render;
document.getElementById('dateSel').onchange = render;
document.getElementById('typeSel').onchange = render;
})();
</script>
</body>
</html>
